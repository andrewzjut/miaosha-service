apiVersion: v1
kind: Service
metadata:
  name: seckill-zookeeper
  namespace: seckill
  labels:
    app: seckill-zookeeper
spec:
  clusterIP: None
  ports:
    - port: 2181
      targetPort: 2181
      name: client
    - port: 2888
      targetPort: 2888
      name: peer
    - port: 3888
      targetPort: 3888
      name: leader-election
  selector:
    app: seckill-zookeeper
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seckill-zookeeper
  namespace: seckill
spec:
  serviceName: seckill-zookeeper
  replicas: 1
  selector:
    matchLabels:
      app: seckill-zookeeper
  template:
    metadata:
      labels:
        app: seckill-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          ports:
            - containerPort: 2181
              name: client
            - containerPort: 2888
              name: peer
            - containerPort: 3888
              name: leader-election
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
            - name: ZOOKEEPER_INIT_LIMIT
              value: "5"
            - name: ZOOKEEPER_SYNC_LIMIT
              value: "2"
          volumeMounts:
            - name: zookeeper-storage
              mountPath: /var/lib/zookeeper/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "nc -z localhost 2181 || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "nc -z localhost 2181 || exit 1"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: zookeeper-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: seckill-kafka
  namespace: seckill
  labels:
    app: seckill-kafka
spec:
  clusterIP: None
  ports:
    - port: 9092
      targetPort: 9092
      name: kafka
    - port: 29092
      targetPort: 29092
      name: kafka-internal
  selector:
    app: seckill-kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seckill-kafka
  namespace: seckill
spec:
  serviceName: seckill-kafka
  replicas: 1
  selector:
    matchLabels:
      app: seckill-kafka
  template:
    metadata:
      labels:
        app: seckill-kafka
    spec:
      initContainers:
        - name: wait-for-zookeeper
          image: confluentinc/cp-kafka:7.5.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Zookeeper..."
              until nc -z seckill-zookeeper-0.seckill-zookeeper.seckill.svc.cluster.local 2181; do
                sleep 2
              done
              echo "Zookeeper is ready"
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 29092
              name: kafka-internal
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "seckill-zookeeper-0.seckill-zookeeper.seckill.svc.cluster.local:2181"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://seckill-kafka-0.seckill-kafka.seckill.svc.cluster.local:29092,PLAINTEXT_INTERNAL://seckill-kafka.seckill.svc.cluster.local:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-storage
              mountPath: /var/lib/kafka/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "nc -z localhost 9092 || exit 1"
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "nc -z localhost 9092 || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
  volumeClaimTemplates:
    - metadata:
        name: kafka-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-kafka-topics
  namespace: seckill
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-kafka
          image: confluentinc/cp-kafka:7.5.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until nc -z seckill-kafka-0.seckill-kafka.seckill.svc.cluster.local 9092; do
                sleep 2
              done
              echo "Kafka is ready"
      containers:
        - name: create-topics
          image: confluentinc/cp-kafka:7.5.0
          command:
            - /bin/sh
            - -c
            - |
              echo "Creating Kafka topics..."
              kafka-topics --bootstrap-server seckill-kafka.seckill.svc.cluster.local:9092 --create --topic seckill-orders --if-not-exists --partitions 3 --replication-factor 1
              echo "Topics created successfully"
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "seckill-kafka-0.seckill-kafka.seckill.svc.cluster.local:9092"
      restartPolicy: OnFailure
  backoffLimit: 3
