apiVersion: v1
kind: ConfigMap
metadata:
  name: seckill-config
  namespace: seckill
data:
  REDIS_HOST: "seckill-redis.seckill.svc.cluster.local"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "seckill-kafka.seckill.svc.cluster.local:9092"
  DB_HOST: "seckill-postgres.seckill.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "seckill"
  DB_USERNAME: "postgres"
  SPRING_PROFILES_ACTIVE: "k8s"
