apiVersion: v1
kind: ServiceAccount
metadata:
  name: seckill-service-account
  namespace: seckill
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: seckill-role
  namespace: seckill
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seckill-role-binding
  namespace: seckill
subjects:
  - kind: ServiceAccount
    name: seckill-service-account
    namespace: seckill
roleRef:
  kind: Role
  name: seckill-role
  apiGroup: rbac.authorization.k8s.io
