apiVersion: apps/v1
kind: Deployment
metadata:
  name: seckill-app
  namespace: seckill
  labels:
    app: seckill-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: seckill-app
  template:
    metadata:
      labels:
        app: seckill-app
    spec:
      serviceAccountName: seckill-service-account
      containers:
        - name: seckill-app
          image: seckill-app:latest
          imagePullPolicy: Never  # 使用本地镜像
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: seckill-config
            - secretRef:
                name: seckill-db-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18
---
apiVersion: v1
kind: Service
metadata:
  name: seckill-app-service
  namespace: seckill
spec:
  selector:
    app: seckill-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: seckill-app-nodeport
  namespace: seckill
  annotations:
    description: "NodePort service for external access"
spec:
  selector:
    app: seckill-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
