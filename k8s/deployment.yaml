apiVersion: apps/v1
kind: Deployment
metadata:
  name: seckill-app
  namespace: default
  labels:
    app: seckill-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: seckill-app
  template:
    metadata:
      labels:
        app: seckill-app
    spec:
      containers:
        - name: seckill-app
          image: seckill-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: seckill-db-secret
                  key: host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "seckill"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: seckill-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: seckill-db-secret
                  key: password
            - name: REDIS_HOST
              value: "redis-master.default.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.default.svc.cluster.local:9092"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: seckill-app-service
  namespace: default
spec:
  selector:
    app: seckill-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
